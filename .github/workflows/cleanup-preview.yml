name: cleanup-preview

# When a PR closes (merged or not), delete the Cloudflare Pages *preview*
# deployments created for that PR's branch. Production deployments are
# env=production and never match the env=preview filter below, so the live
# site is never touched. Reuses the same secrets as deploy-site.yml.

on:
  pull_request:
    types: [closed]

# Don't run two cleanups for the same PR at once.
concurrency:
  group: cleanup-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete preview deployments for this branch
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT: figgydeck
          BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          api="https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/$PROJECT/deployments"
          page=1
          found=0
          while :; do
            resp=$(curl -sf -H "Authorization: Bearer $CF_API_TOKEN" \
              "$api?env=preview&per_page=25&page=$page")
            count=$(jq '.result | length' <<<"$resp")
            [ "$count" -eq 0 ] && break
            # Match on the deployment's recorded git branch (not the sanitized
            # alias), then force-delete so the branch-alias (latest) one goes too.
            for id in $(jq -r --arg b "$BRANCH" \
                  '.result[] | select(.deployment_trigger.metadata.branch == $b) | .id' <<<"$resp"); do
              echo "Deleting preview deployment $id"
              curl -sf -X DELETE -H "Authorization: Bearer $CF_API_TOKEN" \
                "$api/$id?force=true" >/dev/null
              found=$((found + 1))
            done
            page=$((page + 1))
          done
          echo "Deleted $found preview deployment(s) for branch '$BRANCH'."
